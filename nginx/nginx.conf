events {}

http {
  upstream backend { server backend:3000; }
  upstream zabbix { server zabbix-web:8080; }
  upstream dozzle { server dozzle:8080; }
  upstream portainer { server portainer:9000; }
  upstream vaultwarden { server vaultwarden:80; }
  upstream metabase { server metabase:3000; }
  
  # Upstream direct vers IT-Tools
  upstream it-tools { server it-tools:80; }

  # -----------------------------------------------
  # Redirect HTTP → HTTPS
  # -----------------------------------------------
  server {
    listen 80 default_server;
    return 301 https://$host$request_uri;
  }

  # ===============================================
  # VIRTUAL HOST 1 : IT-TOOLS (Attrape tous les nip.io)
  # ===============================================
  server {
    listen 443 ssl;
    server_name *.nip.io;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    # Protection par mot de passe global pour IT-Tools (car pas de login interne)
    auth_basic "Acces Restreint - Infra DevOps";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
      proxy_pass http://it-tools/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # ===============================================
  # VIRTUAL HOST 2 : DASHBOARD PRINCIPAL (Par défaut)
  # ===============================================
  server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # -----------------------------------------------
    # Front (statique) - SANS htpasswd pour afficher la belle interface
    # -----------------------------------------------
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }

    # -----------------------------------------------
    # API vers backend Node.js
    # -----------------------------------------------
    location /api/ {
      proxy_pass http://backend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # -----------------------------------------------
    # Zabbix Web
    # -----------------------------------------------
    location /zabbix/ {
      proxy_pass http://zabbix/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------
    # Portainer
    # -----------------------------------------------
    location /portainer/ {
      proxy_pass http://portainer/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # -----------------------------------------------
    # Dozzle (logs) - AVEC htpasswd (car pas de login interne)
    # -----------------------------------------------
    location /logs/ {
      auth_basic "Acces Restreint - Logs Systemes";
      auth_basic_user_file /etc/nginx/.htpasswd;

      proxy_pass http://dozzle/logs/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_buffering off;
      proxy_cache off;
    }

    # -----------------------------------------------
    # Vaultwarden
    # -----------------------------------------------
    location /vaultwarden/ {
      proxy_pass http://vaultwarden/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /vaultwarden/notifications/hub {
      proxy_pass http://vaultwarden/notifications/hub;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # -----------------------------------------------
    # Metabase (CrowdSec Dashboard)
    # -----------------------------------------------
    location /metabase/ {
      proxy_pass http://metabase/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}